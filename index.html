<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chúc mừng 8/3</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:linear-gradient(120deg,#ff9a9e,#fad0c4);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
}

h1{
font-size:60px;
text-shadow:0 0 20px white;
animation:glow 2s infinite alternate;
}

p{
font-size:24px;
}

@keyframes glow{
from{ text-shadow:0 0 10px white;}
to{ text-shadow:0 0 40px pink;}
}

/* balloons */

.balloon{
position:absolute;
bottom:-200px;
width:60px;
height:80px;
background:red;
border-radius:50%;
animation:rise 10s infinite;
}

.balloon:after{
content:'';
position:absolute;
width:2px;
height:80px;
background:white;
left:50%;
top:80px;
}

@keyframes rise{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);}
}

/* fireworks canvas */

canvas{
position:absolute;
top:0;
left:0;
}

</style>

</head>

<body>

<canvas id="fireworks"></canvas>

<div>

<h1>💐 Chúc mừng 8/3 💐</h1>

<p>
Chúc một nửa thế giới luôn xinh đẹp, hạnh phúc  
và tràn đầy yêu thương 💖
</p>

<p>
Chúc bạn luôn rạng rỡ như những đóa hoa 🌸
</p>

</div>

<script>

/* balloons */

for(let i=0;i<20;i++){
let b=document.createElement("div");
b.className="balloon";
b.style.left=Math.random()*100+"vw";
b.style.background=`hsl(${Math.random()*360},70%,60%)`;
b.style.animationDuration=6+Math.random()*6+"s";
document.body.appendChild(b);
}

/* fireworks */

const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

function firework(){
let x=Math.random()*canvas.width;
let y=Math.random()*canvas.height/2;

for(let i=0;i<80;i++){
particles.push({
x:x,
y:y,
angle:Math.random()*Math.PI*2,
speed:Math.random()*5+2,
life:100
});
}
}

function update(){
ctx.fillStyle="rgba(0,0,0,0.1)";
ctx.fillRect(0,0,canvas.width,canvas.height);

particles.forEach((p,i)=>{
p.x+=Math.cos(p.angle)*p.speed;
p.y+=Math.sin(p.angle)*p.speed;
p.life--;

ctx.fillStyle=`hsl(${Math.random()*360},100%,60%)`;
ctx.fillRect(p.x,p.y,3,3);

if(p.life<=0) particles.splice(i,1);
});

requestAnimationFrame(update);
}

setInterval(firework,1000);

update();

</script>

</body>
</html>
