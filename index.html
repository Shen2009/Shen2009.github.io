<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chúc mừng 8/3</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb);
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* Glass card */

.card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:60px;
border-radius:20px;
text-align:center;
color:white;
box-shadow:0 10px 40px rgba(0,0,0,0.2);
animation:fade 2s ease;
}

@keyframes fade{
from{opacity:0; transform:scale(.8)}
to{opacity:1; transform:scale(1)}
}

h1{
font-size:70px;
margin-bottom:20px;
text-shadow:0 0 25px white;
}

p{
font-size:24px;
line-height:1.6;
}

/* Hearts */

.heart{
position:absolute;
color:#ff4d6d;
font-size:20px;
animation:float 8s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh); opacity:1}
100%{transform:translateY(-10vh); opacity:0}
}

/* Flowers */

.flower{
position:absolute;
font-size:25px;
animation:fall 12s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh) rotate(0)}
100%{transform:translateY(110vh) rotate(360deg)}
}

/* Balloons */

.balloon{
position:absolute;
bottom:-200px;
width:60px;
height:80px;
border-radius:50%;
animation:rise 10s infinite;
}

.balloon:after{
content:'';
position:absolute;
width:2px;
height:80px;
background:white;
left:50%;
top:80px;
}

@keyframes rise{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}

/* Fireworks */

canvas{
position:absolute;
top:0;
left:0;
}

</style>

</head>

<body>

<canvas id="fireworks"></canvas>

<div class="card">

<h1>💐 8 / 3 💐</h1>

<p>
Chúc một nửa thế giới luôn xinh đẹp 🌸  
hạnh phúc 💖  
và luôn rạng rỡ như những đóa hoa.
</p>

<p style="margin-top:20px">
Happy Women's Day ✨
</p>

</div>

<script>

/* hearts */

for(let i=0;i<40;i++){
let h=document.createElement("div")
h.className="heart"
h.innerHTML="💖"
h.style.left=Math.random()*100+"vw"
h.style.animationDuration=5+Math.random()*5+"s"
document.body.appendChild(h)
}

/* flowers */

for(let i=0;i<30;i++){
let f=document.createElement("div")
f.className="flower"
f.innerHTML="🌸"
f.style.left=Math.random()*100+"vw"
f.style.animationDuration=8+Math.random()*6+"s"
document.body.appendChild(f)
}

/* balloons */

for(let i=0;i<15;i++){
let b=document.createElement("div")
b.className="balloon"
b.style.left=Math.random()*100+"vw"
b.style.background=`hsl(${Math.random()*360},70%,60%)`
b.style.animationDuration=6+Math.random()*6+"s"
document.body.appendChild(b)
}

/* fireworks */

const canvas=document.getElementById("fireworks")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

function firework(){
let x=Math.random()*canvas.width
let y=Math.random()*canvas.height/2

for(let i=0;i<80;i++){
particles.push({
x:x,
y:y,
angle:Math.random()*Math.PI*2,
speed:Math.random()*5+2,
life:100
})
}
}

function update(){

ctx.fillStyle="rgba(0,0,0,0.08)"
ctx.fillRect(0,0,canvas.width,canvas.height)

particles.forEach((p,i)=>{
p.x+=Math.cos(p.angle)*p.speed
p.y+=Math.sin(p.angle)*p.speed
p.life--

ctx.fillStyle=`hsl(${Math.random()*360},100%,60%)`
ctx.fillRect(p.x,p.y,3,3)

if(p.life<=0) particles.splice(i,1)
})

requestAnimationFrame(update)

}

setInterval(firework,1200)

update()

</script>

</body>
</html>
